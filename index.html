<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>世界の空港 標高マップ</title>

<!-- MapLibre GL JS（地図本体） -->
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />

<!-- deck.gl（3Dの棒グラフ） -->

<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", system-ui, sans-serif; }
  #map { position: absolute; inset: 0; background: #0b1020; }

  .card {
    position:absolute; z-index:5; color:#fff;
    background:rgba(10,16,32,.72); border:1px solid rgba(255,255,255,.12);
    border-radius:12px; backdrop-filter:blur(6px); padding:10px 14px;
  }
  #title { top:14px; left:14px; max-width:330px; }
  #title h1 { margin:0 0 4px; font-size:16px; letter-spacing:.02em; }
  #title p { margin:0; font-size:11px; color:#9fb3d1; line-height:1.5; }

  #controls { top:14px; right:14px; width:210px; font-size:12px; }
  #controls label { display:block; margin-bottom:6px; color:#cfe0f7; }
  #controls input[type=range] { width:100%; }
  #exVal { color:#ffd36b; font-variant-numeric:tabular-nums; }
  #controls .region { margin-top:12px; }
  #controls button {
    width:100%; margin-top:6px; padding:6px; cursor:pointer; font-size:12px;
    color:#fff; background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.18); border-radius:8px;
  }
  #controls button:hover { background:rgba(255,255,255,.16); }

  #legend { bottom:16px; left:14px; font-size:11px; }
  #legend b { display:block; margin-bottom:6px; color:#cfe0f7; }
  .legrow { display:flex; align-items:center; gap:8px; margin:3px 0; }
  .swatch { width:16px; height:10px; border-radius:2px; }

  #panel {
    right:14px; bottom:16px; width:262px; padding:16px;
    background:rgba(10,16,32,.92); border:1px solid rgba(255,255,255,.15);
    border-radius:14px; backdrop-filter:blur(8px);
    transform:translateY(160%); transition:transform .25s ease;
    box-shadow:0 10px 40px rgba(0,0,0,.5);
  }
  #panel.show { transform:translateY(0); }
  #panel .code { font-size:11px; color:#9fb3d1; letter-spacing:.08em; }
  #panel h2 { margin:2px 0 10px; font-size:18px; }
  #panel .big { font-size:30px; font-weight:700; }
  #panel .big small { font-size:13px; color:#9fb3d1; font-weight:400; }
  #panel .row { display:flex; justify-content:space-between; font-size:12px; color:#cfe0f7; margin:6px 0; }
  #panel .close { position:absolute; top:10px; right:12px; cursor:pointer; color:#9fb3d1; font-size:18px; }
  #panel .close:hover { color:#fff; }
</style>
</head>
<body>
<div id="map"></div>

<div id="title" class="card">
  <h1>🛫 世界の空港 標高マップ</h1>
  <p>棒の<b>高さ</b>＝空港の標高。色も標高に対応。<br>棒にカーソルを乗せる／タップで情報が出ます。</p>
</div>

<div id="controls" class="card">
  <label>高さの強調 <span id="exVal">×200</span></label>
  <input id="exaggerate" type="range" min="50" max="1000" step="50" value="200" />
  <div class="region">
    <button id="btn-world">🌐 世界全体へ</button>
    <button id="btn-japan">🗾 日本へズーム</button>
  </div>
  <a href="weather.html" style="display:block;margin-top:10px;padding:8px;text-align:center;cursor:pointer;font-size:12px;color:#0b1020;background:#ffd36b;border-radius:8px;text-decoration:none;font-weight:700">🌦️ リアルタイム天気版へ</a>
  <div style="display:none">
  </div>
</div>

<div id="legend" class="card">
  <b>標高（m）</b>
  <div class="legrow"><span class="swatch" style="background:rgb(0,80,210)"></span>0–10</div>
  <div class="legrow"><span class="swatch" style="background:rgb(0,140,230)"></span>10–50</div>
  <div class="legrow"><span class="swatch" style="background:rgb(0,200,200)"></span>50–150</div>
  <div class="legrow"><span class="swatch" style="background:rgb(0,200,100)"></span>150–400</div>
  <div class="legrow"><span class="swatch" style="background:rgb(150,210,0)"></span>400–800</div>
  <div class="legrow"><span class="swatch" style="background:rgb(240,200,0)"></span>800–1500</div>
  <div class="legrow"><span class="swatch" style="background:rgb(245,140,0)"></span>1500–2500</div>
  <div class="legrow"><span class="swatch" style="background:rgb(235,60,20)"></span>2500–3500</div>
  <div class="legrow"><span class="swatch" style="background:rgb(220,30,120)"></span>3500以上</div>
</div>

<div id="panel" class="card">
  <span class="close" onclick="hidePanel()">✕</span>
  <div class="code" id="p-code"></div>
  <h2 id="p-name"></h2>
  <div class="big"><span id="p-elev"></span><small> m</small></div>
  <div class="row"><span>英語名</span><span id="p-en"></span></div>
  <div class="row"><span>国・地域</span><span id="p-country"></span></div>
  <div class="row"><span>緯度</span><span id="p-lat"></span></div>
  <div class="row"><span>経度</span><span id="p-lon"></span></div>
</div>

/* 標高 → 色（凡例と対応） */
function elevColor(e) {
  if (e < 10)   return [0, 80, 210];
  if (e < 50)   return [0, 140, 230];
  if (e < 150)  return [0, 200, 200];
  if (e < 400)  return [0, 200, 100];
  if (e < 800)  return [150, 210, 0];
  if (e < 1500) return [240, 200, 0];
  if (e < 2500) return [245, 140, 0];
  if (e < 3500) return [235, 60, 20];
  return [220, 30, 120];
}

/* 視点プリセット */
const VIEWS = {
  world: { center: [40, 25], zoom: 1.3, pitch: 40, bearing: 0 },
  japan: { center: [137.5, 37.5], zoom: 4.4, pitch: 55, bearing: -10 },
};

/* 地図 */
const map = new maplibregl.Map({
  container: "map",
  style: "https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json",
  ...VIEWS.world,
  antialias: true,
});
map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), "bottom-right");

let exaggeration = 200;

function makeLayer() {
  return new deck.ColumnLayer({
    id: "airport-columns",
    data: AIRPORTS,
    diskResolution: 12,
    radius: 14000,                // 棒の太さ（メートル）
    radiusUnits: "meters",
    extruded: true,
    pickable: true,
    elevationScale: exaggeration, // 高さの強調
    getPosition: d => [d.lon, d.lat],
    getElevation: d => d.elev,
    getFillColor: d => elevColor(d.elev),
    material: { ambient: 0.6, diffuse: 0.6, shininess: 32, specularColor: [255,255,255] },
    onClick: info => { if (info.object) showPanel(info.object); },
    updateTriggers: { getElevation: exaggeration },
  });
}

const overlay = new deck.MapboxOverlay({
  interleaved: true,
  layers: [makeLayer()],
  getTooltip: ({ object }) =>
    object && {
      html: `<div style="font-weight:700;margin-bottom:2px">${object.name} (${object.code})</div>
             <div style="color:#9fb3d1;margin-bottom:2px">${object.country}</div>
             <div>標高 <b style="color:#ffd36b">${object.elev} m</b></div>`,
      style: {
        background: "rgba(10,16,32,.95)", color: "#fff",
        padding: "8px 10px", borderRadius: "8px",
        border: "1px solid rgba(255,255,255,.2)", fontSize: "12px",
      },
    },
});

map.on("load", () => { map.addControl(overlay); });

/* 強調スライダー */
const exInput = document.getElementById("exaggerate");
const exVal = document.getElementById("exVal");
exInput.addEventListener("input", e => {
  exaggeration = +e.target.value;
  exVal.textContent = "×" + exaggeration;
  overlay.setProps({ layers: [makeLayer()] });
});

/* 視点ボタン */
document.getElementById("btn-world").addEventListener("click", () => map.flyTo({ ...VIEWS.world, duration: 1500 }));
document.getElementById("btn-japan").addEventListener("click", () => map.flyTo({ ...VIEWS.japan, duration: 1500 }));

/* 詳細パネル */
const panel = document.getElementById("panel");
function showPanel(a) {
  document.getElementById("p-code").textContent = a.code;
  document.getElementById("p-name").textContent = a.name;
  document.getElementById("p-elev").textContent = a.elev;
  document.getElementById("p-en").textContent = a.en;
  document.getElementById("p-country").textContent = a.country;
  document.getElementById("p-lat").textContent = a.lat.toFixed(4);
  document.getElementById("p-lon").textContent = a.lon.toFixed(4);
  panel.classList.add("show");
}
function hidePanel() { panel.classList.remove("show"); }
</script>
</body>
</html>
